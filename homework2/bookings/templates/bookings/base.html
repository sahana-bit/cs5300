<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Movie Theater{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand text-white" href="{% url 'movie_list' %}">Movie Theater - Click to see Movies Playing Now! </a>
  <div class="ms-auto">
    <a class="btn btn-outline-light me-2" href="{% url 'booking_history' %}">My Bookings</a>
      {% if user.is_authenticated %}
      <span class="text-white me-2">Hi, {{ user.username }}</span>
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
          {% csrf_token %}
          <button class="btn btn-light" type="submit">Logout</button>
        </form>
      {% else %}
        <a class="btn btn-light" href="{% url 'login' %}">Login</a>
      {% endif %}
  </div>
</nav>

<div class="container py-4">
  {% block content %}
    {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} mt-3" role="alert">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endblock %}
</div>
</body>
</html>
