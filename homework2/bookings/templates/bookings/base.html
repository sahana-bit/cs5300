<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>{% block title %}Movie Theater{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand text-white" href="{% url 'movie_list' %}">Movie Theater</a>
  <div class="ms-auto">
    <a class="btn btn-outline-light me-2" href="{% url 'booking_history' %}">My Bookings</a>
    {% if user.is_authenticated %}
      <span class="text-white me-2">Hi, {{ user.username }}</span>
      <a class="btn btn-light" href="/admin/logout/">Logout</a>
    {% else %}
      <a class="btn btn-light" href="/admin/login/">Login</a>
    {% endif %}
  </div>
</nav>

<div class="container py-4">
  {% block content %}{% endblock %}
</div>
</body>
</html>
